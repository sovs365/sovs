services:
  - type: web
    name: sovs-backend
    runtime: node
    plan: free
    
    buildCommand: npm install
    startCommand: npm start
    
    env:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: PORT
        value: 3000
    
    # Environment variables should be set in Render dashboard
    # Add these in Render Environment Variables:
    # - DATABASE_URL
    # - JWT_SECRET
    # - JWT_ISSUER
    # - JWT_AUDIENCE
    # - JWT_EXPIRATION_MS
    # - CORS_ALLOWED_HOSTS
    # - BREVO_API_KEY + BREVO_FROM_EMAIL (preferred)
    # - BREVO_SMTP_LOGIN (optional, if SMTP auth login differs from sender email)
    #   or SMTP_SENDER_EMAIL + SMTP_APP_PASSWORD (fallback)
    
    healthCheckPath: /
    
    # Auto-deploy on git push
    autoDeploy: true
